  <text x="480" y="79" text-anchor="middle" font-size="9" fill="#94a3b8">Launch tools · Submit jobs · Manage data · Publish datasets</text>

  <!-- Connector lines from portal -->
  <line x1="260" y1="90" x2="155" y2="118" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="480" y1="90" x2="480" y2="118" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="700" y1="90" x2="805" y2="118" stroke="#cbd5e1" stroke-width="1"/>

