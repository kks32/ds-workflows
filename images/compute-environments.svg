  <rect x="430" y="452" width="72" height="14" rx="3" fill="white"/>
  <text x="466" y="462" text-anchor="middle" font-size="8" fill="#059669">Work mounted</text>

  <!-- Corral box -->
  <rect x="20" y="470" width="580" height="64" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
