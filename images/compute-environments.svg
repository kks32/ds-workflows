  <text x="68" y="511" font-size="10" fill="#a16207">Backed up · persistent · data and compute co-located</text>
  <text x="36" y="528" font-size="10" fill="#78716c">MyData  ·  MyProjects  ·  CommunityData  ·  Published</text>

  <!-- TACC filesystems box -->
  <rect x="630" y="470" width="310" height="64" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
