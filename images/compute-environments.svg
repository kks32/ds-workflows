  <rect x="21" y="156" width="268" height="86" fill="#f0f7ff"/>
  <text x="272" y="170" text-anchor="end" font-size="8" fill="#93c5fd" font-weight="600">RESOURCES</text>
  <text x="38" y="186" font-size="10.5" fill="#334155">Standard: 8 cores · 20 GB RAM</text>
  <text x="38" y="202" font-size="10.5" fill="#334155">HPC Native (Stampede3): full node</text>
  <text x="38" y="218" font-size="10.5" fill="#334155">HPC Native (Vista): H200 GPUs</text>
  <text x="38" y="236" font-size="10" fill="#64748b">Standard starts immediately, no queue</text>

  <rect x="21" y="242" width="268" height="64" fill="#f8faff"/>
  <text x="272" y="256" text-anchor="end" font-size="8" fill="#93c5fd" font-weight="600">APPLICATIONS</text>
  <text x="38" y="271" font-size="10.5" fill="#334155">Python · R · Julia · OpenSeesPy</text>
  <text x="38" y="287" font-size="10.5" fill="#334155">dapi · tapipy · Jupyter notebooks</text>

  <rect x="21" y="306" width="268" height="111" fill="white"/>
  <text x="272" y="320" text-anchor="end" font-size="8" fill="#93c5fd" font-weight="600">USE WHEN</text>
  <text x="38" y="335" font-size="10.5" fill="#475569">Developing and testing code</text>
  <text x="38" y="351" font-size="10.5" fill="#475569">Pre/post-processing results</text>
  <text x="38" y="367" font-size="10.5" fill="#475569">Submitting HPC jobs via dapi</text>
  <text x="38" y="383" font-size="10.5" fill="#475569">Plotting and visualization</text>
  <text x="38" y="399" font-size="10.5" fill="#475569">GPU/AI/ML work (Vista native)</text>

