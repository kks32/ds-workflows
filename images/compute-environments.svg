  <circle cx="706" cy="141.5" r="1" fill="#10b981"/>
  <text x="716" y="142" font-size="13" font-weight="600" fill="#065f46">HPC at TACC</text>

  <rect x="671" y="156" width="268" height="86" fill="#ecfdf5"/>
  <text x="805" y="160" text-anchor="middle" font-size="8.5" fill="#64748b">Stampede3 · Frontera · Lonestar6</text>
  <text x="922" y="170" text-anchor="end" font-size="8" fill="#6ee7b7" font-weight="600">RESOURCES</text>
  <text x="688" y="186" font-size="10.5" fill="#334155">Up to thousands of cores</text>
  <text x="688" y="202" font-size="10.5" fill="#334155">Multi-node · MPI parallel</text>
  <text x="688" y="218" font-size="10.5" fill="#334155">GPU nodes (Intel, NVIDIA A100)</text>
  <text x="688" y="236" font-size="10" fill="#64748b">SLURM queue · dedicated allocation</text>

  <rect x="671" y="242" width="268" height="64" fill="#f0fdf4"/>
  <text x="922" y="256" text-anchor="end" font-size="8" fill="#6ee7b7" font-weight="600">APPLICATIONS</text>
  <text x="688" y="271" font-size="10.5" fill="#334155">OpenSees MP · OpenFOAM · ADCIRC</text>
  <text x="688" y="287" font-size="10.5" fill="#334155">LS-DYNA · MPM · SimCenter tools</text>

  <rect x="671" y="306" width="268" height="111" fill="white"/>
  <text x="922" y="320" text-anchor="end" font-size="8" fill="#6ee7b7" font-weight="600">USE WHEN</text>
  <text x="688" y="335" font-size="10.5" fill="#475569">Large nonlinear FE models</text>
  <text x="688" y="351" font-size="10.5" fill="#475569">CFD with domain decomposition</text>
  <text x="688" y="367" font-size="10.5" fill="#475569">Parameter sweeps (PyLauncher)</text>
  <text x="688" y="383" font-size="10.5" fill="#475569">Regional hazard simulations</text>
  <text x="688" y="399" font-size="10.5" fill="#475569">GPU-accelerated ML training</text>

