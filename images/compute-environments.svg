  <rect x="321" y="156" width="318" height="86" fill="#faf5ff"/>
  <text x="622" y="170" text-anchor="end" font-size="8" fill="#d8b4fe" font-weight="600">RESOURCES</text>
  <text x="338" y="186" font-size="10.5" fill="#334155">Up to 48 cores · 49 GB RAM</text>
  <text x="338" y="202" font-size="10.5" fill="#334155">Single node · shared across users</text>
  <text x="338" y="218" font-size="10.5" fill="#334155">Interactive or submit-only</text>
  <text x="338" y="236" font-size="10" fill="#64748b">No queue · DCV desktop available</text>

  <rect x="321" y="242" width="318" height="64" fill="#fdf8ff"/>
  <text x="622" y="256" text-anchor="end" font-size="8" fill="#d8b4fe" font-weight="600">APPLICATIONS</text>
  <text x="338" y="271" font-size="10.5" fill="#334155">MATLAB · OpenSees · ADCIRC</text>
  <text x="338" y="287" font-size="10.5" fill="#334155">STKO (DCV) · QGIS (DCV)</text>

  <rect x="321" y="306" width="318" height="111" fill="white"/>
  <text x="622" y="320" text-anchor="end" font-size="8" fill="#d8b4fe" font-weight="600">USE WHEN</text>
  <text x="338" y="335" font-size="10.5" fill="#475569">Quick serial model tests</text>
  <text x="338" y="351" font-size="10.5" fill="#475569">Interactive MATLAB or ADCIRC session</text>
  <text x="338" y="367" font-size="10.5" fill="#475569">Exploring spatial data in QGIS</text>
  <text x="338" y="383" font-size="10.5" fill="#475569">Building models in STKO desktop</text>
  <text x="338" y="399" font-size="10.5" fill="#475569">Visualizing results in ParaView</text>

  <!-- ==================== HPC ==================== -->
